version: "3"
services:
  rsoul:
    restart: unless-stopped
    container_name: rsoul
    hostname: rsoul
    environment: 
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
      #Script interval in seconds
      - SCRIPT_INTERVAL=300
    user: "1000:1000"
    volumes:
      #"You can set /downloads to whatever you want but will then need to change the Slskd download dir in your config file"
      - /path/to/slskd/downloads:/downloads
      # Stacks download directory (uncomment if using Stacks backend)
      # - /path/to/stacks/downloads:/stacks-downloads
      #Select where you are storing your config file. Leave "/data" since thats where the script expects the config file to be
      - /path/to/config/dir:/data
    image: mephistopheles1/rsoul:latest

  # Uncomment to run FlareSolverr for DDoS-Guard bypass (used by Stacks backend)
  # flaresolverr:
  #   image: ghcr.io/flaresolverr/flaresolverr:latest
  #   container_name: flaresolverr
  #   restart: unless-stopped
  #   environment:
  #     - LOG_LEVEL=info
  #   ports:
  #     - "8191:8191"
