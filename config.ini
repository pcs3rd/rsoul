[Readarr]
api_key = YOUR_READARR_API_KEY
host_url = http://localhost:8787
# Set to True to disable automatic import into Readarr (default: False)
disable_sync = False

[Slskd]
api_key = YOUR_SLSKD_API_KEY
host_url = http://localhost:5030
url_base = /
download_dir = /path/to/slskd/downloads
# Directory path as seen by Readarr (if running in Docker/mapped volumes)
# Defaults to download_dir if not set
readarr_download_dir = /mapped/path/to/slskd/downloads
delete_searches = True
stalled_timeout = 3600
remote_queue_timeout = 300

[Stacks]
# Stacks + Anna's Archive backend configuration
# Requires a running Stacks instance: https://github.com/zelestcarlyone/stacks
api_key = YOUR_STACKS_API_KEY
host_url = http://localhost:7788
download_dir = /path/to/stacks/downloads
# Directory path as seen by Readarr (if running in Docker/mapped volumes)
# Defaults to download_dir if not set
readarr_download_dir = /mapped/path/to/stacks/downloads
# Timeouts in seconds
search_timeout = 30
download_timeout = 600
poll_interval = 5
# Minimum match score (0.0-1.0) for title/author matching against AA results
min_match_ratio = 0.5
# FlareSolverr configuration for bypassing DDoS-Guard protection
# Requires a running FlareSolverr instance: docker run -d -p 8191:8191 ghcr.io/flaresolverr/flaresolverr:latest
flaresolverr_enabled = False
flaresolverr_url = http://localhost:8191/v1

[Backends]
# Comma-separated list of backends in priority order (first = preferred)
# Available backends: slskd, stacks
priority = slskd,stacks
# Enable/disable individual backends
slskd_enabled = True
stacks_enabled = False

[Search Settings]
search_timeout = 5000
maximum_peer_queue = 50
minimum_peer_upload_speed = 0
minimum_filename_match_ratio = 0.7
# Preferred ebook formats in priority order (first = most preferred)
preferred_formats = epub,azw3,mobi
# Pre-filter thresholds to reject obviously wrong matches early
# Minimum length ratio (shorter/longer string) - rejects if strings differ too much in length
min_length_ratio = 0.4
# Minimum Jaccard token overlap ratio - rejects if too few words in common
min_jaccard_ratio = 0.25
# Minimum number of overlapping words required
min_word_overlap = 2
# Component-wise matching: match author and title segments separately
# Minimum Jaccard for title component (rejects if title words don't match)
min_title_jaccard = 0.3
# Minimum Jaccard for author component
min_author_jaccard = 0.5
ignored_users = User1,User2
book_prepend_author = True
# Search type: first_page, incrementing_page, all
search_type = incrementing_page
number_of_books_to_grab = 10
remove_wanted_on_failure = False
title_blacklist = word1,word2
# Search source: missing, cutoff_unmet, all
search_source = missing
# Maximum fallback attempts when search returns zero results (default: 5)
max_search_fallbacks = 5

[Download Settings]
download_filtering = True
use_extension_whitelist = False
extensions_whitelist = lrc,nfo,txt

[Postprocessing]
# Matching thresholds for metadata validation (0.0 - 1.0)
match_ratio_exact = 0.8
match_ratio_normalized = 0.85
match_ratio_word = 0.7
match_ratio_loose = 0.85
match_ratio_jaccard = 0.5
# Set to True to skip all metadata validation (let Readarr handle it)
skip_validation = False

[Logging]
level = INFO
# https://docs.python.org/3/library/logging.html#logrecord-attributes
# Note: When colors are enabled (TTY), a custom formatter is used that ignores this format
format = [%(levelname)s|%(module)s|L%(lineno)d] %(asctime)s:	%(message)s
# https://docs.python.org/3/library/time.html#time.strftime
datefmt = %Y-%m-%dT%H:%M:%S%z
